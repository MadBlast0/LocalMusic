<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donate - Coming Soon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', sans-serif;
      background: linear-gradient(135deg, #0f0f13 0%, #1a1a1f 100%);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 600px;
      animation: fadeIn 0.6s ease;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .heart {
      font-size: 80px;
      color: #6b9dff;
      animation: heartbeat 1.5s ease-in-out infinite;
      display: inline-block;
      margin-bottom: 30px;
      filter: drop-shadow(0 0 20px rgba(107, 157, 255, 0.5));
    }
    
    @keyframes heartbeat {
      0%, 100% {
        transform: scale(1);
      }
      10%, 30% {
        transform: scale(1.1);
      }
      20%, 40% {
        transform: scale(1);
      }
    }
    
    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #6b9dff 0%, #4d7fff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }
    
    p {
      font-size: 1.2rem;
      color: #a0a0a0;
      line-height: 1.8;
      margin-bottom: 40px;
    }
    
    .info {
      background: rgba(100, 150, 255, 0.1);
      border: 1px solid rgba(100, 150, 255, 0.3);
      border-radius: 12px;
      padding: 24px;
      margin-top: 30px;
      backdrop-filter: blur(10px);
    }
    
    .info p {
      font-size: 0.95rem;
      margin: 0;
      color: #8bb3ff;
    }
    
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }
    
    .feature {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 20px;
      transition: all 0.3s ease;
    }
    
    .feature:hover {
      background: rgba(100, 150, 255, 0.1);
      border-color: rgba(100, 150, 255, 0.3);
      transform: translateY(-2px);
    }
    
    .feature-icon {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    
    .feature-text {
      font-size: 0.9rem;
      color: #a0a0a0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="heart">❤️</div>
    <h1>Coming Soon</h1>
    <p>We're working on setting up donation options to support the development of this project. Thank you for your interest in supporting us!</p>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">☕</div>
        <div class="feature-text">Buy us a coffee</div>
      </div>
      <div class="feature">
        <div class="feature-icon">💝</div>
        <div class="feature-text">One-time donation</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🌟</div>
        <div class="feature-text">Monthly support</div>
      </div>
    </div>
    
    <div class="info">
      <p>💙 Your support helps us maintain and improve this free, open-source music downloader.</p>
    </div>
  </div>
</body>
</html>
